name: Next.js Build and Runtime Check

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "file:./test.db"

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate --schema=./prisma/schema.prisma

      - name: Lint
        run: npm run lint --if-present
        continue-on-error: true

      - name: Build Next.js
        run: npm run build

      - name: Upload standalone build
        uses: actions/upload-artifact@v7
        with:
          name: next-build
          path: .next/standalone
          if-no-files-found: error

  container-test:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Download standalone build
        uses: actions/download-artifact@v8
        with:
          name: next-build
          path: .next/standalone

      - name: Build Docker image
        run: docker build -t nextjs-test .

      - name: Run container
        run: docker run -d -p 3000:3000 --name nextjs-app nextjs-test

      - name: Wait for app startup
        run: |
          sleep 10

      - name: Measure Response Time
        run: |
          mkdir -p metrics
          RESPONSE_TIME=$(curl -o /dev/null -s -w "%{time_total}" http://localhost:3000)
          echo "Response Time (s): $RESPONSE_TIME"
          echo "timestamp=$(date -u +"%Y-%m-%dT%H:%M:%SZ"),route=/,response_time_seconds=$RESPONSE_TIME" >> metrics/response-time.log

      - name: Test app availability
        run: curl --fail http://localhost:3000

      - name: Upload response time log
        uses: actions/upload-artifact@v7
        with:
          name: response-time-metrics
          path: metrics/response-time.log
          if-no-files-found: warn

      - name: Cleanup container
        if: always()
        run: docker rm -f nextjs-app || true